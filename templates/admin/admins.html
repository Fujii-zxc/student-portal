{% extends "base.html" %}
{% block title %}Admin Accounts{% endblock %}
{% block content %}
<div class="page-header"><h1>Admin Accounts</h1></div>

<div class="card">
  <h2>Add a New Admin</h2>
  <form method="POST" action="{{ url_for('admin.manage_admins') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <div class="form-row">
      <div>
        <label>Full Name</label>
        <input type="text" name="full_name" required>
      </div>
      <div>
        <label>Email</label>
        <input type="email" name="email" required>
      </div>
      <div>
        <label>Password</label>
        <input type="password" name="password" required minlength="8">
      </div>
    </div>
    <button type="submit" class="btn accent">Create Admin</button>
  </form>
</div>

<div class="card">
  <h2>Current Admins</h2>
  <table>
    <thead><tr><th>Name</th><th>Email</th><th>Joined</th></tr></thead>
    <tbody>
      {% for a in admins %}
      <tr><td>{{ a.full_name }}</td><td>{{ a.email }}</td><td>{{ a.created_at }}</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
