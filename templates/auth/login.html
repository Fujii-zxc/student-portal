{% extends "base.html" %}
{% block title %}Log In &mdash; {{ school_name }}{% endblock %}
{% block content %}
<div class="card narrow" style="margin: 40px auto;">
  <h2>Log In</h2>
  <form method="POST" action="{{ url_for('auth.login') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <label for="email">Email</label>
    <input type="email" id="email" name="email" required autofocus>

    <label for="password">Password</label>
    <input type="password" id="password" name="password" required>

    <button type="submit" class="btn accent" style="width:100%;">Log In</button>
  </form>
  <p style="margin-top:16px; font-size:0.88rem;">
    Don't have an account? <a href="{{ url_for('auth.register') }}">Register here</a>
  </p>
  <p style="font-size:0.8rem; color:var(--muted);">
    Admin demo login: admin@university.edu / Admin123!
  </p>
</div>
{% endblock %}
